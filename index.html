<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#9aaf90",
                        "secondary": "#5b5f5c",
                        "on-error-container": "#93000a",
                        "surface-container": "#e1f5ca",
                        "on-secondary-container": "#5e625e",
                        "secondary-fixed-dim": "#c4c7c3",
                        "on-primary-fixed-variant": "#394c33",
                        "surface-container-high": "#dbefc4",
                        "surface-container-highest": "#d5e9bf",
                        "on-tertiary-container": "#3c3e3e",
                        "secondary-container": "#dbded9",
                        "outline": "#75786e",
                        "inverse-surface": "#253518",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "tertiary": "#5d5f5f",
                        "on-primary-fixed": "#0f1f0b",
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-tint": "#506449",
                        "surface": "#efffda",
                        "on-surface": "#111f05",
                        "surface-bright": "#efffda",
                        "on-primary-container": "#30422a",
                        "surface-variant": "#d5e9bf",
                        "surface-dim": "#cde1b7",
                        "outline-variant": "#c5c8bc",
                        "on-secondary-fixed-variant": "#444844",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-background": "#111f05",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#e0e3de",
                        "background": "#efffda",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#e3f8cc",
                        "tertiary-container": "#a8a9a9",
                        "surface-container-low": "#e6facf",
                        "on-surface-variant": "#44483f",
                        "tertiary-fixed": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#454747",
                        "primary": "#506449",
                        "on-secondary-fixed": "#191c1a",
                        "primary-fixed": "#d3e9c7",
                        "inverse-primary": "#b7cdac",
                        "primary-fixed-dim": "#b7cdac",
                        "on-error": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed">
<!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-surface-container-lowest/60 backdrop-blur-md">
        <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">
        <!-- Brand Logo -->
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">eco</span>
                <span class="font-serif text-2xl font-bold text-on-surface italic">Oasis</span>
            </div>
        <!-- Search Bar (on_left/centered logic) -->
        <div class="hidden md:flex flex-1 max-w-xl mx-12">
            <div class="w-full relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">search</span>
                <input class="w-full bg-surface-variant/40 border-none rounded-full py-3 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-on-surface-variant/50 text-body" placeholder="Search our botanical collection..." type="text"/>
            </div>
        </div>
        <!-- Nav Icons & Web Navigation -->
            <nav class="flex items-center gap-8">
                <div class="hidden lg:flex items-center gap-6">
                    <a class="text-primary font-bold border-b-2 border-primary pb-1 font-label text-sm uppercase tracking-widest" href="#">Shop</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors font-label text-sm uppercase tracking-widest" href="#">Gallery</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors font-label text-sm uppercase tracking-widest" href="#">Care</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="p-2 hover:bg-surface-container-low transition-all duration-300 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined">shopping_cart</span>
                    </button>
                <button class="p-2 hover:bg-surface-container-low transition-all duration-300 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined">person</span>
                </button>
                </div>
            </nav>
        </div>
    </header>
    
</body>
</html>
